apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
        - name: web-app
          image: my-web-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          env:
            - name: STUDENT_NAME
              value: "Albin"